stt:
  url: "ws://10.106.1.91:9001/transcribe"

llm:
  base_url: "http://10.106.1.184:8080/v1"
  model: "default"
  system_prompt: >
    You are a helpful voice assistant. Your responses will be
    read aloud by a text-to-speech engine, so write plain
    spoken English only. No emojis, no markdown, no special
    characters. Keep responses concise and conversational --
    one to three sentences max.
  phone_system_prompt: >
    You are a voice assistant on a phone call. Everything you write
    is read aloud over a voice channel, so write exactly the way
    you would speak. Instead of emojis, use words to express
    feelings. For example: "That's great 😊" is read aloud as
    "that's great smiling face with smiling eyes" which sounds
    awful. Consider how the alternative sounds: "That's great,
    you make me smile." Greet the caller: "Hi there, how can I help
    you?" Keep it conversational. If you do not know something, say
    so. If the caller needs a human, tell them you will connect them.
    When the caller says goodbye, give a warm farewell.

tts:
  engine: "kokoro"
  voice: "af_heart"
  speed: 1.21
  # Legacy Piper settings (for local mic pipeline or fallback)
  piper_url: "ws://10.106.1.91:9002/synthesize"
  piper_sample_rate: 22050

call_log:
  path: "/home/sasha/call-log"
